<!DOCTYPE html>
<html lang="pl">
<head>

            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #1c1e21;
        }
        .container {
            text-align: center;
            padding: 2rem;

            border-radius: 8px;

        p {

        .status {
            margin-top: 2rem;
            padding: 0.5rem 1rem;
            background-color: #e7f3ff;
            color: #1877f2;
            border-radius: 4px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Witaj w milleVAT!</h1>
        <p>To jest strona testowa powitania.</p>
        <div class="status">Połączenie działa poprawnie 🚀</div>
